<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1c1a17" />
<title>今朝 — 朝刊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f2e9; --paper-2:#efece1;
    --ink:#1c1a17; --ink-soft:#4a463d; --ink-faint:#777166;
    --rule:#26231d; --rule-soft:#cdc8b9;
    --seal:#b22a17; --up:#2f6b3a;
    --maxw:1180px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Noto Serif JP",serif; line-height:1.7;
    background-image:repeating-linear-gradient(0deg, rgba(0,0,0,.018) 0 1px, transparent 1px 3px);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 18px 64px;}

  /* topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 2px;font-size:12px;letter-spacing:.04em;color:var(--ink-soft);border-bottom:1px solid var(--rule-soft);flex-wrap:wrap;}
  .topbar .meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .topbar .sep{color:var(--rule-soft);}
  .wx{display:inline-flex;align-items:center;gap:6px;}
  .wx b{font-weight:700;color:var(--ink);}
  .actions{display:flex;gap:8px;}
  button.act{font-family:inherit;font-size:12px;letter-spacing:.04em;background:transparent;color:var(--ink);border:1px solid var(--rule);padding:5px 11px;cursor:pointer;transition:background .15s,color .15s;}
  button.act:hover{background:var(--ink);color:var(--paper);}
  button.act[aria-pressed="true"]{background:var(--seal);border-color:var(--seal);color:#fff;}
  button.act:focus-visible{outline:2px solid var(--seal);outline-offset:2px;}

  /* masthead */
  .masthead{position:relative;text-align:center;padding:26px 0 10px;}
  .title{font-family:"Shippori Mincho B1",serif;font-weight:800;font-size:clamp(58px,12vw,128px);line-height:.92;letter-spacing:.06em;margin:0;color:var(--ink);}
  .title rt{font-size:.18em;font-weight:500;letter-spacing:.3em;color:var(--ink-soft);}
  .subtitle{font-family:"Shippori Mincho B1",serif;font-weight:500;letter-spacing:.62em;font-size:13px;color:var(--ink-soft);margin:10px 0 0;padding-left:.62em;text-transform:uppercase;}
  .seal{position:absolute;left:6px;top:30px;border:2px solid var(--seal);color:var(--seal);padding:10px 7px;writing-mode:vertical-rl;font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:15px;letter-spacing:.18em;line-height:1.25;transform:rotate(-3deg);opacity:.92;}
  .edbox{position:absolute;right:6px;top:34px;text-align:right;font-size:12px;color:var(--ink-soft);line-height:1.7;}
  .edbox b{font-weight:700;color:var(--ink);font-size:13px;}
  .rule-double{border-top:3px solid var(--rule);border-bottom:1px solid var(--rule);height:4px;margin:14px 0 0;}

  /* nav */
  nav.sections{display:flex;flex-wrap:wrap;justify-content:center;border-bottom:1px solid var(--rule);}
  nav.sections button{display:inline-flex;align-items:center;gap:6px;font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:16px;letter-spacing:.12em;background:transparent;border:0;color:var(--ink-soft);padding:11px 15px;cursor:pointer;position:relative;}
  nav.sections button svg{width:17px;height:17px;opacity:.8;}
  nav.sections button[aria-current="true"]{color:var(--ink);}
  nav.sections button[aria-current="true"] svg{opacity:1;}
  nav.sections button[aria-current="true"]::after{content:"";position:absolute;left:10px;right:10px;bottom:-1px;height:3px;background:var(--seal);}
  nav.sections button:hover{color:var(--ink);}
  nav.sections button:focus-visible{outline:2px solid var(--seal);outline-offset:-2px;}

  /* info strip: weather + markets */
  .infostrip{display:grid;grid-template-columns:1fr 1.4fr;gap:0;border-bottom:1px solid var(--rule);margin:0 0 24px;}
  .infostrip .half{padding:14px 0;}
  .infostrip .wxhalf{border-right:1px solid var(--rule-soft);padding-right:22px;}
  .infostrip .mkthalf{padding-left:22px;}
  .strip-h{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:12px;letter-spacing:.22em;color:var(--seal);margin:0 0 10px;display:flex;align-items:center;gap:7px;}
  .strip-h::before{content:"■";font-size:8px;}
  .strip-h .note{margin-left:auto;color:var(--ink-faint);letter-spacing:.04em;font-weight:400;}
  .wxrow{display:flex;gap:6px;}
  .wxday{flex:1;text-align:center;border:1px solid var(--rule-soft);padding:8px 4px;}
  .wxday .d{font-size:11px;color:var(--ink-faint);margin-bottom:4px;}
  .wxday svg{width:26px;height:26px;display:block;margin:0 auto 5px;}
  .wxday .t{font-size:13px;font-weight:600;}
  .wxday .t .lo{color:var(--ink-faint);font-weight:400;}
  .mktrow{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .mkt{border-left:2px solid var(--rule);padding-left:10px;}
  .mkt .nm{font-size:12px;color:var(--ink-soft);letter-spacing:.04em;}
  .mkt .vl{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:19px;line-height:1.2;margin:1px 0;}
  .mkt .ch{font-size:12px;font-weight:600;}
  .mkt .ch.dn{color:var(--seal);}
  .mkt .ch.up{color:var(--up);}
  .mkt svg.spark{width:100%;height:30px;margin-top:5px;display:block;}
  .muted{color:var(--ink-faint);}

  /* front page */
  .lead{display:grid;grid-template-columns:1.55fr 1fr;gap:0;border-bottom:1px solid var(--rule);padding-bottom:26px;margin-bottom:26px;}
  .lead .hero{padding-right:30px;border-right:1px solid var(--rule-soft);}
  .lead .aside{padding-left:30px;}
  .eyebrow{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:13px;letter-spacing:.2em;color:var(--seal);display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .eyebrow::before{content:"■";font-size:9px;}

  /* illustration / photo plate */
  .plate{position:relative;width:100%;aspect-ratio:16/9;border:1px solid var(--rule);background:var(--paper-2);overflow:hidden;margin-bottom:6px;}
  .plate .emblem{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink);}
  .plate .emblem svg{width:62%;height:82%;}
  .plate .photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.04);}
  .caption{font-size:11px;color:var(--ink-faint);font-style:italic;margin:0 0 14px;letter-spacing:.02em;}

  a.story{color:inherit;text-decoration:none;display:block;}
  a.story:focus-visible{outline:2px solid var(--seal);outline-offset:3px;}
  .hl-lead{font-family:"Shippori Mincho B1",serif;font-weight:800;font-size:clamp(28px,4.2vw,46px);line-height:1.18;letter-spacing:.01em;margin:0 0 14px;color:var(--ink);}
  a.story:hover .hl-lead{color:var(--seal);}
  .byline{font-size:12.5px;color:var(--ink-faint);letter-spacing:.03em;border-top:1px solid var(--rule-soft);padding-top:8px;}
  .byline .src{color:var(--ink-soft);font-weight:600;}

  .aside h2.kicker{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:14px;letter-spacing:.2em;margin:0 0 4px;padding-bottom:8px;border-bottom:2px solid var(--rule);}
  .aside .item{padding:13px 0;border-bottom:1px solid var(--rule-soft);}
  .aside .item:last-child{border-bottom:0;}
  .hl-sm{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:18px;line-height:1.4;margin:0 0 5px;}
  a.story:hover .hl-sm{color:var(--seal);}

  /* secondary grid */
  .grid{column-count:3;column-gap:30px;column-rule:1px solid var(--rule-soft);}
  .grid .item{break-inside:avoid;padding:0 0 16px;margin-bottom:16px;border-bottom:1px solid var(--rule-soft);}
  .grid .thumb{width:100%;aspect-ratio:16/10;border:1px solid var(--rule-soft);overflow:hidden;margin-bottom:8px;background:var(--paper-2);}
  .grid .thumb img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.04);display:block;}
  .grid .hl-md{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:19px;line-height:1.42;margin:0 0 6px;}
  a.story:hover .hl-md{color:var(--seal);}
  .grid .byline{border-top:0;padding-top:0;}

  /* states */
  .state{padding:60px 12px;text-align:center;color:var(--ink-soft);border-bottom:1px solid var(--rule-soft);}
  .state h3{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:22px;margin:0 0 10px;color:var(--ink);}
  .state p{margin:0 0 18px;font-size:14px;}
  .state .diag{margin-top:18px;font-size:11px;color:var(--ink-faint);letter-spacing:0;word-break:break-all;font-family:ui-monospace,monospace;}
  .skel{animation:pulse 1.4s ease-in-out infinite;}
  .skel-bar{height:14px;background:var(--rule-soft);margin:0 auto 12px;}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:.9}}

  footer{margin-top:36px;padding-top:14px;border-top:3px double var(--rule);font-size:12px;color:var(--ink-faint);text-align:center;letter-spacing:.05em;line-height:1.9;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:11px 20px;font-size:13px;letter-spacing:.04em;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;max-width:90vw;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .reveal{opacity:0;transform:translateY(8px);animation:rise .5s ease forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}

  @media(max-width:880px){
    .grid{column-count:2;}
    .lead{grid-template-columns:1fr;}
    .lead .hero{padding-right:0;border-right:0;border-bottom:1px solid var(--rule-soft);padding-bottom:20px;margin-bottom:20px;}
    .lead .aside{padding-left:0;}
    .infostrip{grid-template-columns:1fr;}
    .infostrip .wxhalf{border-right:0;border-bottom:1px solid var(--rule-soft);padding-right:0;padding-bottom:14px;}
    .infostrip .mkthalf{padding-left:0;}
  }
  @media(max-width:560px){
    .grid{column-count:1;}
    .seal{position:static;display:inline-block;writing-mode:horizontal-tb;transform:rotate(-2deg);margin-bottom:10px;font-size:13px;padding:6px 10px;}
    .edbox{position:static;text-align:center;margin-top:8px;}
    .masthead{padding-top:14px;}
    nav.sections{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;}
    nav.sections button{flex:0 0 auto;}
    .mktrow{grid-template-columns:1fr;}
  }
  @media(prefers-reduced-motion:reduce){.reveal,.skel{animation:none;opacity:1;transform:none;}.toast{transition:opacity .2s;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="meta">
      <span id="issue">第 — 号</span><span class="sep">|</span>
      <span id="date">読み込み中</span><span class="sep">|</span>
      <span class="wx" id="wx">天気を取得中…</span>
    </div>
    <div class="actions">
      <button class="act" id="refresh" type="button">更新</button>
      <button class="act" id="notify" type="button" aria-pressed="false">朝6時に届ける</button>
    </div>
  </div>

  <header class="masthead">
    <div class="seal" id="seal" aria-hidden="true"></div>
    <div class="edbox"><b>朝刊</b><br>あなたの朝のために<br>編集：AI ニュース部</div>
    <h1 class="title"><ruby>今朝<rt>けさ</rt></ruby></h1>
    <p class="subtitle">Morning Edition</p>
    <div class="rule-double"></div>
  </header>

  <nav class="sections" id="nav" aria-label="紙面"></nav>

  <section class="infostrip" aria-label="天気と市況">
    <div class="half wxhalf">
      <div class="strip-h">きょうの天気・倉敷<span class="note" id="wxnote"></span></div>
      <div class="wxrow" id="wxcard"><div class="muted" style="font-size:13px">取得中…</div></div>
    </div>
    <div class="half mkthalf">
      <div class="strip-h">市況・前日終値<span class="note">出典 Stooq</span></div>
      <div class="mktrow" id="mkt"><div class="muted" style="font-size:13px">取得中…</div></div>
    </div>
  </section>

  <main id="page" aria-live="polite"></main>

  <footer>
    今朝新聞社　|　紙面はその日の見出しを自動編成しています<br>
    記事：Google ニュース　・　市況：Stooq　・　天気：Open-Meteo（倉敷）
  </footer>
</div>

<div class="toast" id="toast" role="status"></div>

<script>
(function(){
  "use strict";

  var TOPIC = function(t){ return "https://news.google.com/rss/headlines/section/topic/"+t+"?hl=ja&gl=JP&ceid=JP:ja"; };
  var SECTIONS = [
    { id:"top",    name:"総合",     url:"https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja", icon:"sun" },
    { id:"nation", name:"国内",     url:TOPIC("NATION"),        icon:"mtn" },
    { id:"biz",    name:"経済",     url:TOPIC("BUSINESS"),      icon:"chart" },
    { id:"world",  name:"国際",     url:TOPIC("WORLD"),         icon:"globe" },
    { id:"tech",   name:"科学技術", url:TOPIC("TECHNOLOGY"),    icon:"atom" },
    { id:"sports", name:"スポーツ", url:TOPIC("SPORTS"),        icon:"cup" },
    { id:"ent",    name:"文化",     url:TOPIC("ENTERTAINMENT"), icon:"mask" }
  ];

  var cache = {}, current = "top", notifyOn = false, notifyTimer = null, lastError = "";
  var $ = function(id){ return document.getElementById(id); };
  function esc(s){ var d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

  /* ---------- inline SVG art ---------- */
  var ICONS = {
    sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>',
    mtn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 19h18L14 7l-3 5-2-2-6 9z"/><path d="M12 9.5l1.2 2"/></svg>',
    chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 20V4M4 20h16M7 16l4-5 3 3 5-7"/><path d="M19 7v4h-4" /></svg>',
    globe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17M12 3.5c2.6 2.4 2.6 14.6 0 17M12 3.5c-2.6 2.4-2.6 14.6 0 17"/></svg>',
    atom:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="1.6"/><ellipse cx="12" cy="12" rx="9" ry="3.6"/><ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(120 12 12)"/></svg>',
    cup:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 4h10v4a5 5 0 01-10 0V4z"/><path d="M17 5h2.5v1.5A2.5 2.5 0 0117 9M7 5H4.5v1.5A2.5 2.5 0 007 9M9.5 13.5h5M9 20h6M11 13.5v3M13 13.5v3M9 20l.5-2h5l.5 2"/></svg>',
    mask:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 5c4-1 10-1 14 0 0 6-1 10-3 12-2 2-6 2-8 0C6 15 5 11 5 5z"/><path d="M9.5 10.5c.7-.6 1.6-.6 2.3 0M12.2 10.5c.7-.6 1.6-.6 2.3 0M10.5 15c1 .7 2 .7 3 0"/></svg>'
  };
  function navIcon(id){ return ICONS[id] || ICONS.sun; }

  // signature: rising-sun emblem (engraving feel)
  var SUN_EMBLEM =
    '<svg viewBox="0 0 200 150" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">'+
    '<g opacity=".35"><path d="M18 28h70M30 38h64M44 20h52"/></g>'+
    '<circle cx="100" cy="78" r="30"/>'+
    '<g stroke-width="1.6"><path d="M100 30v-14M100 140v-14M152 78h14M34 78H20M137 41l10-10M53 115l-10 10M137 115l10 10M53 41 43 31"/></g>'+
    '<g opacity=".55"><path d="M100 58a20 20 0 010 40" stroke-width="1"/></g>'+
    '<path d="M0 112h200" stroke-width="1.6"/>'+
    '<g opacity=".4"><path d="M0 120h200M0 128h200M0 136h200"/></g>'+
    '<g opacity=".7" stroke-width="1.3"><path d="M40 50c4-4 8-4 12 0 4-4 8-4 12 0"/><path d="M150 38c3-3 6-3 9 0 3-3 6-3 9 0"/></g>'+
    '</svg>';

  function wxIconSvg(type){
    var s='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">';
    if(type==="sun") s+='<circle cx="12" cy="12" r="4.2"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.5 5.5l1.4 1.4M17.1 17.1l1.4 1.4M18.5 5.5l-1.4 1.4M6.9 17.1l-1.4 1.4"/>';
    else if(type==="part") s+='<circle cx="9" cy="9" r="3.2"/><path d="M9 2.5v1.6M3.7 3.7l1.1 1.1M2.5 9h1.6"/><path d="M8 15h8.5a3.5 3.5 0 100-7 4.5 4.5 0 00-8.6 1.4A3.2 3.2 0 008 15z"/>';
    else if(type==="cloud") s+='<path d="M7 17h9.5a3.5 3.5 0 100-7 4.7 4.7 0 00-9-1.2A3.6 3.6 0 007 17z"/>';
    else if(type==="rain") s+='<path d="M7 14h9.5a3.5 3.5 0 100-7 4.7 4.7 0 00-9-1.2A3.6 3.6 0 007 14z"/><path d="M8 17l-1 3M12 17l-1 3M16 17l-1 3"/>';
    else if(type==="snow") s+='<path d="M7 13h9.5a3.5 3.5 0 100-7 4.7 4.7 0 00-9-1.2A3.6 3.6 0 007 13z"/><path d="M9 17h.01M12 19h.01M15 17h.01M12 16h.01"/>';
    else s+='<circle cx="12" cy="12" r="6"/>';
    return s+'</svg>';
  }

  /* ---------- date ---------- */
  var DOW=["日","月","火","水","木","金","土"];
  var K=["〇","一","二","三","四","五","六","七","八","九"];
  function kan(n){ if(n<10)return K[n]; if(n===10)return "十"; if(n<20)return "十"+(n%10?K[n%10]:""); var t=Math.floor(n/10),o=n%10; return K[t]+"十"+(o?K[o]:""); }
  function setupDate(){
    var d=new Date(), reiwa=d.getFullYear()-2018;
    $("date").textContent=d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日（"+DOW[d.getDay()]+"）";
    var days=Math.floor((d-new Date(2000,0,1))/86400000);
    $("issue").textContent="第 "+(days*3+10000).toLocaleString()+" 号";
    $("seal").textContent="令和"+kan(reiwa)+"年"+kan(d.getMonth()+1)+"月"+kan(d.getDate())+"日";
  }
  function ago(date){ if(!date)return ""; var m=Math.floor((Date.now()-date.getTime())/60000); if(m<1)return "たった今"; if(m<60)return m+"分前"; var h=Math.floor(m/60); if(h<24)return h+"時間前"; return Math.floor(h/24)+"日前"; }

  /* ---------- fetch helpers ---------- */
  function fetchT(url, ms){
    var ctrl=("AbortController" in window)?new AbortController():null;
    var to=ctrl?setTimeout(function(){ctrl.abort();}, ms||9000):null;
    return fetch(url,{cache:"no-store",signal:ctrl?ctrl.signal:undefined})
      .then(function(r){ if(to)clearTimeout(to); if(!r.ok)throw new Error("HTTP "+r.status); return r; })
      .catch(function(e){ if(to)clearTimeout(to); throw e; });
  }
  function proxiedText(u){
    var chain=[
      function(){ return fetchT("https://api.allorigins.win/get?url="+encodeURIComponent(u)).then(function(r){return r.json();}).then(function(d){ if(!d||!d.contents)throw new Error("noc"); return d.contents; }); },
      function(){ return fetchT("https://api.codetabs.com/v1/proxy/?quest="+encodeURIComponent(u)).then(function(r){return r.text();}); },
      function(){ return fetchT("https://api.allorigins.win/raw?url="+encodeURIComponent(u)).then(function(r){return r.text();}); }
    ];
    var i=0; function go(){ if(i>=chain.length)return Promise.reject(new Error("proxy fail")); return chain[i++]().catch(go); }
    return go();
  }

  /* ---------- news ---------- */
  function normalize(rawTitle, link, pubDate, src, img){
    rawTitle=(rawTitle||"").trim(); var title=rawTitle;
    var sep=rawTitle.lastIndexOf(" - ");
    if(sep>0){ title=rawTitle.slice(0,sep).trim(); if(!src)src=rawTitle.slice(sep+3).trim(); }
    return { title:title, link:link||"#", source:(src||"提供元不明"), date:pubDate?new Date(pubDate):null, img:img||"" };
  }
  function parseXml(text){
    if(!text)return null;
    var xml=new DOMParser().parseFromString(text,"text/xml");
    if(xml.querySelector("parsererror"))return null;
    var nodes=xml.querySelectorAll("item"); if(!nodes.length)return null;
    var out=[];
    nodes.forEach(function(it){
      var t=it.querySelector("title"); t=t?t.textContent:"";
      var l=it.querySelector("link"); l=l?l.textContent.trim():"#";
      var s=it.querySelector("source"); s=s?s.textContent.trim():"";
      var p=it.querySelector("pubDate"); p=p?p.textContent:"";
      var enc=it.querySelector("enclosure"); var img=enc?enc.getAttribute("url"):"";
      var n=normalize(t,l,p,s,img); if(n.title)out.push(n);
    });
    return out.length?out:null;
  }
  var FETCHERS=[
    function(u){ return fetchT("https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(u)).then(function(r){return r.json();}).then(function(d){
      if(!d||d.status!=="ok"||!d.items||!d.items.length)throw new Error("rss2json:empty");
      var out=d.items.map(function(it){ var img=it.thumbnail||(it.enclosure&&it.enclosure.link)||""; return normalize(it.title,it.link,it.pubDate,"",img); }).filter(function(n){return n.title;});
      if(!out.length)throw new Error("rss2json:notitle"); return out; }); },
    function(u){ return fetchT("https://api.allorigins.win/get?url="+encodeURIComponent(u)).then(function(r){return r.json();}).then(function(d){ var it=parseXml(d&&d.contents); if(!it)throw new Error("allorigins/get:empty"); return it; }); },
    function(u){ return fetchT("https://api.codetabs.com/v1/proxy/?quest="+encodeURIComponent(u)).then(function(r){return r.text();}).then(function(t){ var it=parseXml(t); if(!it)throw new Error("codetabs:empty"); return it; }); },
    function(u){ return fetchT("https://api.allorigins.win/raw?url="+encodeURIComponent(u)).then(function(r){return r.text();}).then(function(t){ var it=parseXml(t); if(!it)throw new Error("allorigins/raw:empty"); return it; }); }
  ];
  function fetchSection(sec){
    if(cache[sec.id])return Promise.resolve(cache[sec.id]);
    var i=0,errs=[];
    function attempt(){
      if(i>=FETCHERS.length){ lastError=errs.join("  /  "); return Promise.reject(new Error(lastError)); }
      var fn=FETCHERS[i++];
      return fn(sec.url).then(function(items){ if(!items||!items.length)throw new Error("empty"); cache[sec.id]=items; return items; })
        .catch(function(e){ errs.push((e&&e.message)||"error"); return attempt(); });
    }
    return attempt();
  }

  /* ---------- weather ---------- */
  function wxType(code){
    if(code===0||code===1)return "sun";
    if(code===2)return "part";
    if(code===3||code===45||code===48)return "cloud";
    if(code>=71&&code<=77||code===85||code===86)return "snow";
    if((code>=51&&code<=67)||(code>=80&&code<=82)||(code>=95))return "rain";
    return "cloud";
  }
  function loadWeather(){
    var u="https://api.open-meteo.com/v1/forecast?latitude=34.585&longitude=133.772&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=3";
    fetchT(u).then(function(r){return r.json();}).then(function(d){
      var ct=wxType(d.current.weather_code), cTemp=Math.round(d.current.temperature_2m);
      $("wx").innerHTML="倉敷 <b>"+cTemp+"°</b>";
      var labels=["きょう","あす","あさって"], html="";
      for(var i=0;i<3;i++){
        var hi=Math.round(d.daily.temperature_2m_max[i]), lo=Math.round(d.daily.temperature_2m_min[i]);
        html+='<div class="wxday"><div class="d">'+labels[i]+'</div>'+wxIconSvg(wxType(d.daily.weather_code[i]))+'<div class="t">'+hi+'<span class="lo"> / '+lo+'°</span></div></div>';
      }
      $("wxcard").innerHTML=html;
    }).catch(function(){
      $("wx").textContent="倉敷 天気";
      $("wxcard").innerHTML='<div class="muted" style="font-size:12px">天気を取得できませんでした（デプロイ環境では取得されます）</div>';
    });
  }

  /* ---------- markets ---------- */
  var MKT=[{nm:"日経平均",sym:"^nkx"},{nm:"ドル円",sym:"usdjpy"},{nm:"NYダウ",sym:"^dji"}];
  function spark(vals){
    if(!vals||vals.length<2)return "";
    var w=120,h=30,p=2,min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),rng=(max-min)||1,pts=[];
    for(var i=0;i<vals.length;i++){ var x=p+i*((w-2*p)/(vals.length-1)), y=p+(h-2*p)*(1-(vals[i]-min)/rng); pts.push(x.toFixed(1)+","+y.toFixed(1)); }
    var up=vals[vals.length-1]>=vals[0], col=up?"var(--up)":"var(--seal)";
    return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polyline points="'+pts.join(" ")+'" fill="none" stroke="'+col+'" stroke-width="1.4"/></svg>';
  }
  function renderMktCell(m, closes){
    if(!closes||closes.length<2) return '<div class="mkt"><div class="nm">'+esc(m.nm)+'</div><div class="vl muted">—</div><div class="ch muted">データ待ち</div></div>';
    var last=closes[closes.length-1], prev=closes[closes.length-2], diff=last-prev, pct=(diff/prev*100);
    var up=diff>=0, sign=up?"▲":"▼", cls=up?"up":"dn";
    var val=(m.sym==="usdjpy")?last.toFixed(2):Math.round(last).toLocaleString();
    return '<div class="mkt"><div class="nm">'+esc(m.nm)+'</div><div class="vl">'+val+'</div>'+
      '<div class="ch '+cls+'">'+sign+' '+Math.abs(pct).toFixed(2)+'%</div>'+spark(closes.slice(-22))+'</div>';
  }
  function loadMarkets(){
    var cells=new Array(MKT.length).fill('<div class="mkt"><div class="nm">…</div><div class="vl muted">—</div><div class="ch muted">取得中</div></div>');
    function paint(){ $("mkt").innerHTML=cells.join(""); }
    paint();
    MKT.forEach(function(m, idx){
      proxiedText("https://stooq.com/q/d/l/?s="+m.sym+"&i=d")
        .then(function(csv){
          var lines=csv.trim().split("\n"); var closes=[];
          for(var i=1;i<lines.length;i++){ var c=lines[i].split(","); var v=parseFloat(c[4]); if(!isNaN(v))closes.push(v); }
          cells[idx]=renderMktCell(m, closes.slice(-40)); paint();
        })
        .catch(function(){ cells[idx]='<div class="mkt"><div class="nm">'+esc(m.nm)+'</div><div class="vl muted">—</div><div class="ch muted">データ待ち</div></div>'; paint(); });
    });
  }

  /* ---------- render front ---------- */
  function byline(it){ return '<div class="byline"><span class="src">'+esc(it.source)+'</span>　'+ago(it.date)+'</div>'; }
  function link(it, inner){ return '<a class="story" href="'+esc(it.link)+'" target="_blank" rel="noopener">'+inner+'</a>'; }
  function plate(it){
    var ph=it.img?'<img class="photo" src="'+esc(it.img)+'" alt="" loading="lazy" onerror="this.remove()">':'';
    return '<div class="plate"><div class="emblem">'+SUN_EMBLEM+'</div>'+ph+'</div>';
  }
  function renderFront(items){
    var lead=items[0], asideItems=items.slice(1,5), gridItems=items.slice(5,17);
    var secName=SECTIONS.filter(function(s){return s.id===current;})[0].name;
    var html='<div class="lead reveal"><div class="hero">';
    html+='<div class="eyebrow">'+esc(secName)+'・本日の一面</div>';
    html+=link(lead, plate(lead)+'<p class="caption">'+(lead.img?'写真：'+esc(lead.source):'今朝新聞・図版')+'</p><h2 class="hl-lead">'+esc(lead.title)+'</h2>')+byline(lead);
    html+='</div><div class="aside"><h2 class="kicker">注目の見出し</h2>';
    asideItems.forEach(function(it){ html+='<div class="item">'+link(it,'<h3 class="hl-sm">'+esc(it.title)+'</h3>'+byline(it))+'</div>'; });
    html+='</div></div>';
    if(gridItems.length){
      html+='<div class="grid reveal">';
      gridItems.forEach(function(it){
        var thumb=it.img?'<div class="thumb"><img src="'+esc(it.img)+'" alt="" loading="lazy" onerror="this.parentNode.remove()"></div>':'';
        html+='<div class="item">'+link(it, thumb+'<h3 class="hl-md">'+esc(it.title)+'</h3>'+byline(it))+'</div>';
      });
      html+='</div>';
    }
    $("page").innerHTML=html;
  }
  function renderLoading(){
    var bars=""; for(var i=0;i<5;i++)bars+='<div class="skel-bar" style="width:'+(70-i*9)+'%"></div>';
    $("page").innerHTML='<div class="state skel"><h3>刷版中…</h3>'+bars+'</div>';
  }
  function renderError(){
    $("page").innerHTML='<div class="state"><h3>本日の紙面を組めませんでした</h3><p>ニュースの取得に失敗しました。回線を確認して、もう一度お試しください。</p><button class="act" id="retry" type="button">再読込</button>'+(lastError?'<p class="diag">詳細：'+esc(lastError)+'</p>':'')+'</div>';
    $("retry").addEventListener("click", function(){ load(current,true); });
  }

  /* ---------- nav ---------- */
  function buildNav(){
    var nav=$("nav");
    SECTIONS.forEach(function(s){
      var b=document.createElement("button"); b.type="button"; b.dataset.id=s.id;
      b.innerHTML=navIcon(s.icon)+'<span>'+s.name+'</span>';
      b.setAttribute("aria-current", s.id===current?"true":"false");
      b.addEventListener("click", function(){ load(s.id); });
      nav.appendChild(b);
    });
  }
  function syncNav(){ Array.prototype.forEach.call($("nav").children, function(b){ b.setAttribute("aria-current", b.dataset.id===current?"true":"false"); }); }
  function load(id, force){
    current=id; syncNav();
    if(force)delete cache[id];
    renderLoading();
    var sec=SECTIONS.filter(function(s){return s.id===id;})[0];
    fetchSection(sec).then(function(items){ if(current===id)renderFront(items); }).catch(function(){ if(current===id)renderError(); });
  }

  /* ---------- toast / morning ---------- */
  var toastTimer=null;
  function toast(msg){ var t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove("show");},2600); }
  function scheduleMorning(){
    clearTimeout(notifyTimer);
    var now=new Date(), next=new Date(); next.setHours(6,0,0,0); if(next<=now)next.setDate(next.getDate()+1);
    notifyTimer=setTimeout(function(){
      if(notifyOn&&"Notification" in window&&Notification.permission==="granted"){ try{ new Notification("今朝 — 朝刊",{body:"本日の紙面が刷り上がりました。"}); }catch(e){} }
      cache={}; setupDate(); loadWeather(); loadMarkets(); load("top",true); scheduleMorning();
    }, next-now);
  }
  function toggleNotify(){
    var btn=$("notify");
    if(notifyOn){ notifyOn=false; clearTimeout(notifyTimer); btn.setAttribute("aria-pressed","false"); btn.textContent="朝6時に届ける"; toast("朝の通知をオフにしました"); return; }
    if(!("Notification" in window)){ toast("この環境では通知を使えません"); return; }
    Notification.requestPermission().then(function(p){
      if(p==="granted"){ notifyOn=true; scheduleMorning(); btn.setAttribute("aria-pressed","true"); btn.textContent="朝6時に届ける（オン）"; toast("毎朝6時にお届けします"); }
      else toast("通知が許可されませんでした");
    });
  }

  /* ---------- init ---------- */
  setupDate(); buildNav(); loadWeather(); loadMarkets(); load("top");
  $("refresh").addEventListener("click", function(){ cache={}; load(current,true); loadWeather(); loadMarkets(); toast("最新の紙面に更新しました"); });
  $("notify").addEventListener("click", toggleNotify);
})();
</script>
</body>
